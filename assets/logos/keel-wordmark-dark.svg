<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Bow icon -->
  <g transform="translate(20, 10) scale(0.55)">
    <path d="M 100 30 L 55 150 Q 100 170 145 150 Z"
          fill="url(#bowGrad)" opacity="0.9"/>
    <line x1="100" y1="30" x2="100" y2="165"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M 50 150 Q 35 145 25 155"
          fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M 150 150 Q 165 145 175 155"
          fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="140" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="58" font-weight="700" fill="#F1F5F9" letter-spacing="-1">keel</text>
</svg>

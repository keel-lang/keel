name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: cargo install mdbook --no-default-features

      - name: Build docs
        run: |
          cd docs && mdbook build
          echo "keel-lang.dev" > ../target/book/CNAME
          cp ../install.sh        ../target/book/install.sh
          cp ../uninstall.sh      ../target/book/uninstall.sh
          cp ../homebrew/keel.rb  ../target/book/keel.rb

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

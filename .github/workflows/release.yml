name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/keel dist/
          cd dist && tar czf ../keel-${{ matrix.target }}.tar.gz keel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: keel-${{ matrix.target }}
          path: keel-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          set -e
          darwin_arm=$(shasum -a 256 keel-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          linux_x86=$(shasum  -a 256 keel-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          echo "darwin_arm=$darwin_arm" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$linux_x86"   >> "$GITHUB_OUTPUT"
          {
            echo "### Install"
            echo ""
            echo '```'
            echo "brew install keel-lang/tap/keel"
            echo "curl -sSf https://keel-lang.dev/install.sh | sh"
            echo '```'
            echo ""
            echo "**Supported platforms:** macOS (Apple Silicon) and Linux x86_64. Intel Macs can build from source."
            echo ""
            echo "### Checksums"
            echo ""
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            echo "| \`keel-aarch64-apple-darwin.tar.gz\` | \`$darwin_arm\` |"
            echo "| \`keel-x86_64-unknown-linux-gnu.tar.gz\` | \`$linux_x86\` |"
          } > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: keel-*.tar.gz
          generate_release_notes: true
          body_path: release_notes.md

  tap:
    # Update keel-lang/homebrew-tap so `brew install keel-lang/tap/keel`
    # sees the new version immediately after the GitHub release is live.
    #
    # Auth: a short-lived installation token minted from the
    # `keel-release-bot` GitHub App (installed on this repo and the tap).
    # Credentials on keel-lang/keel:
    #   - Actions variable `TAP_APP_CLIENT_ID` (non-secret identifier)
    #   - Actions secret   `TAP_APP_PRIVATE_KEY` (PEM contents)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Mint tap token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: keel-lang
          repositories: homebrew-tap

      # Resolve the App's bot user id so commits below can use the
      # canonical `<slug>[bot]` identity that GitHub recognises and
      # auto-marks as Verified.
      - name: Resolve bot user id
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          slug='${{ steps.app-token.outputs.app-slug }}'
          user_id=$(gh api "/users/${slug}[bot]" --jq .id)
          echo "slug=$slug"        >> "$GITHUB_OUTPUT"
          echo "user_id=$user_id"  >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: keel-lang/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          set -e
          darwin_arm=$(shasum -a 256 keel-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          linux_x86=$(shasum  -a 256 keel-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          echo "darwin_arm=$darwin_arm" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$linux_x86"   >> "$GITHUB_OUTPUT"

      - name: Write Formula/keel.rb
        env:
          VERSION: ${{ github.ref_name }}
          DARWIN_ARM: ${{ steps.sha.outputs.darwin_arm }}
          LINUX_X86:  ${{ steps.sha.outputs.linux_x86 }}
        run: |
          set -e
          mkdir -p Formula
          ver="${VERSION#v}"
          cat > Formula/keel.rb <<EOF
          # Auto-generated by keel-lang/keel release workflow on tag $VERSION.
          # Install: brew install keel-lang/tap/keel
          #
          # Supported platforms: macOS (Apple Silicon) and Linux x86_64.
          # Intel Macs can build from source via `cargo build --release`.
          class Keel < Formula
            desc "A programming language where AI agents are first-class citizens (alpha)"
            homepage "https://keel-lang.dev"
            license "MIT"
            version "$ver"

            on_macos do
              on_arm do
                url "https://github.com/keel-lang/keel/releases/download/$VERSION/keel-aarch64-apple-darwin.tar.gz"
                sha256 "$DARWIN_ARM"
              end
              # Intel Macs: build from source — no prebuilt binary.
            end

            on_linux do
              url "https://github.com/keel-lang/keel/releases/download/$VERSION/keel-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$LINUX_X86"
            end

            def install
              bin.install "keel"
            end

            test do
              system "#{bin}/keel", "--version"
            end
          end
          EOF

      - name: Commit + push to tap
        env:
          VERSION: ${{ github.ref_name }}
          BOT_SLUG: ${{ steps.bot.outputs.slug }}
          BOT_USER_ID: ${{ steps.bot.outputs.user_id }}
        run: |
          git config user.name  "${BOT_SLUG}[bot]"
          git config user.email "${BOT_USER_ID}+${BOT_SLUG}[bot]@users.noreply.github.com"
          git add Formula/keel.rb
          git commit -m "Update keel to $VERSION" || echo "no changes"
          git push

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/keel dist/
          cd dist && tar czf ../keel-${{ matrix.target }}.tar.gz keel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: keel-${{ matrix.target }}
          path: keel-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          set -e
          darwin_arm=$(shasum -a 256 keel-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          darwin_x86=$(shasum -a 256 keel-x86_64-apple-darwin.tar.gz  | cut -d' ' -f1)
          linux_x86=$(shasum  -a 256 keel-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          echo "darwin_arm=$darwin_arm" >> "$GITHUB_OUTPUT"
          echo "darwin_x86=$darwin_x86" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$linux_x86"   >> "$GITHUB_OUTPUT"
          {
            echo "### Checksums"
            echo ""
            echo "| File | SHA-256 |"
            echo "| --- | --- |"
            echo "| \`keel-aarch64-apple-darwin.tar.gz\` | \`$darwin_arm\` |"
            echo "| \`keel-x86_64-apple-darwin.tar.gz\`  | \`$darwin_x86\` |"
            echo "| \`keel-x86_64-unknown-linux-gnu.tar.gz\` | \`$linux_x86\` |"
          } > release_notes.md

      - name: Regenerate Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
          DARWIN_ARM: ${{ steps.sha.outputs.darwin_arm }}
          DARWIN_X86: ${{ steps.sha.outputs.darwin_x86 }}
          LINUX_X86:  ${{ steps.sha.outputs.linux_x86 }}
        run: |
          set -e
          # Strip the leading `v` for Formula.version.
          ver="${VERSION#v}"
          cat > homebrew/keel.rb <<EOF
          # Auto-generated by .github/workflows/release.yml on tag $VERSION.
          # Install: brew install --formula https://keel-lang.dev/keel.rb
          class Keel < Formula
            desc "A programming language where AI agents are first-class citizens (alpha)"
            homepage "https://github.com/keel-lang/keel"
            license "MIT"
            version "$ver"

            on_macos do
              on_arm do
                url "https://github.com/keel-lang/keel/releases/download/$VERSION/keel-aarch64-apple-darwin.tar.gz"
                sha256 "$DARWIN_ARM"
              end
              on_intel do
                url "https://github.com/keel-lang/keel/releases/download/$VERSION/keel-x86_64-apple-darwin.tar.gz"
                sha256 "$DARWIN_X86"
              end
            end

            on_linux do
              url "https://github.com/keel-lang/keel/releases/download/$VERSION/keel-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$LINUX_X86"
            end

            def install
              bin.install "keel"
            end

            test do
              system "#{bin}/keel", "--version"
            end
          end
          EOF

      - name: Commit updated formula to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Homebrew formula for ${{ github.ref_name }}"
          file_pattern: homebrew/keel.rb
          branch: main

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: keel-*.tar.gz
          generate_release_notes: true
          body_path: release_notes.md
